            - ctnContent:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Fill: =varTheme.black
                  Height: =Parent.Height
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =24
                  LayoutOverflowY: =LayoutOverflow.Scroll
                  PaddingBottom: =32
                  PaddingLeft: =32
                  PaddingRight: =32
                  PaddingTop: =32
                  Width: =Parent.Width - 240
                  X: =240
                Children:
                  - ctnHeader:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        FillPortions: =0
                        Height: =80
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =6
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                      Children:
                        - empLblPageTitle:
                            Control: Label
                            Properties:
                              AlignInContainer: =AlignInContainer.Stretch
                              Color: =varTheme.white
                              Fill: =RGBA(0,0,0,0)
                              Font: =varTheme.serif
                              FontWeight: =FontWeight.Bold
                              Height: =48
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =36
                              Text: ="Employees"
                              Wrap: =false
                        - empLblPageSubtitle:
                            Control: ModernText
                            Properties:
                              AlignInContainer: =AlignInContainer.Stretch
                              Color: =varTheme.silver
                              Font: =varTheme.sans
                              Height: =20
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =13
                              Text: ="Talent pool considered for nomination cycles"
                              Wrap: =false
                  - ctnFilterBar:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        FillPortions: =0
                        Height: =48
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =12
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                      Children:
                        - txtSearch:
                            Control: ModernTextInput
                            Properties:
                              AlignInContainer: =AlignInContainer.Center
                              BorderColor: =varTheme.lightGray
                              Color: =varTheme.offWhite
                              Default: =locSearch
                              Fill: =varTheme.darkGray
                              Height: =40
                              OnChange: |-
                                =UpdateContext({
                                  locSearch: Self.Text
                                })
                              Placeholder: ="Search name or title"
                        - cbxTalent:
                            Control: ModernCombobox
                            Properties:
                              AlignInContainer: =AlignInContainer.Center
                              Height: =40
                              Items: =Distinct(colEmployees, TalentClass)
                              ItemDisplayText: =ThisItem.Value
                              OnChange: |-
                                =UpdateContext({
                                  locTalent: First(Self.SelectedItems).Value
                                })
                              SelectMultiple: =false
                              Width: =200
                        - cbxCountry:
                            Control: ModernCombobox
                            Properties:
                              AlignInContainer: =AlignInContainer.Center
                              Height: =40
                              Items: =Distinct(colEmployees, Country)
                              ItemDisplayText: =ThisItem.Value
                              OnChange: |-
                                =UpdateContext({
                                  locCountry: First(Self.SelectedItems).Value
                                })
                              SelectMultiple: =false
                              Width: =180
                        - cbxTarget:
                            Control: ModernCombobox
                            Properties:
                              AlignInContainer: =AlignInContainer.Center
                              Height: =40
                              Items: =["All","Yes","No"]
                              ItemDisplayText: =ThisItem.Value
                              OnChange: |-
                                =UpdateContext({
                                  locTarget: Coalesce(First(Self.SelectedItems).Value, "All")
                                })
                              SelectMultiple: =false
                              Width: =160
                        - ctnSpacer:
                            Control: GroupContainer
                            Variant: AutoLayout
                            Properties:
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutMinHeight: =0
                              LayoutMinWidth: =0
                        - tglSortDesc:
                            Control: Toggle
                            Properties:
                              AlignInContainer: =AlignInContainer.Center
                              Checked: =locSortDesc
                              Height: =40
                              OnSelect: |-
                                =UpdateContext({
                                  locSortDesc: Self.Checked
                                })
                              Width: =180
                        - lblSortDesc:
                            Control: ModernText
                            Properties:
                              AlignInContainer: =AlignInContainer.Center
                              Color: =varTheme.silver
                              Font: =varTheme.sans
                              FontWeight: =FontWeight.Semibold
                              Height: =40
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =11
                              Text: ="Sort Z to A"
                              Width: =80
                              Wrap: =false
                        - btnClearFilters:
                            Control: Button
                            Properties:
                              AlignInContainer: =AlignInContainer.Center
                              Appearance: ='ButtonCanvas.Appearance'.Secondary
                              FontColor: =varTheme.offWhite
                              Height: =40
                              OnSelect: |-
                                =UpdateContext({
                                  locSearch: "",
                                  locTalent: "",
                                  locCountry: "",
                                  locTarget: "All",
                                  locSortDesc: false
                                })
                              Text: ="Clear"
                              Width: =80
                  - lblResultsCount:
                      Control: ModernText
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        Color: =varTheme.lightGray
                        Font: =varTheme.sans
                        Height: =18
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =11
                        Text: |-
                          =CountRows(
                            Filter(colEmployees,
                              (locSearch = "" || locSearch in FullName || locSearch in JobTitle)
                              && (IsBlank(locTalent) || TalentClass = locTalent)
                              && (IsBlank(locCountry) || Country = locCountry)
                              && (locTarget = "All"
                                  || (locTarget = "Yes" && KeyPlayer)
                                  || (locTarget = "No" && !KeyPlayer)))
                          ) & " employees match your filters"
                        Wrap: =false
                  - ctnTableHeader:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =varTheme.darkGray
                        FillPortions: =0
                        Height: =36
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =12
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        PaddingLeft: =16
                        PaddingRight: =16
                      Children:
                        - lblHdrName:
                            Control: ModernText
                            Properties:
                              AlignInContainer: =AlignInContainer.Stretch
                              Color: =varTheme.silver
                              FillPortions: =3
                              Font: =varTheme.sans
                              FontWeight: =FontWeight.Semibold
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =10
                              Text: ="EMPLOYEE"
                              Wrap: =false
                        - lblHdrTalent:
                            Control: ModernText
                            Properties:
                              AlignInContainer: =AlignInContainer.Stretch
                              Color: =varTheme.silver
                              FillPortions: =2
                              Font: =varTheme.sans
                              FontWeight: =FontWeight.Semibold
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =10
                              Text: ="TALENT CLASS"
                              Wrap: =false
                        - lblHdrPerf:
                            Control: ModernText
                            Properties:
                              AlignInContainer: =AlignInContainer.Stretch
                              Color: =varTheme.silver
                              FillPortions: =2
                              Font: =varTheme.sans
                              FontWeight: =FontWeight.Semibold
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =10
                              Text: ="PERFORMANCE"
                              Wrap: =false
                        - lblHdrRisk:
                            Control: ModernText
                            Properties:
                              AlignInContainer: =AlignInContainer.Stretch
                              Color: =varTheme.silver
                              FillPortions: =1
                              Font: =varTheme.sans
                              FontWeight: =FontWeight.Semibold
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =10
                              Text: ="FLIGHT RISK"
                              Wrap: =false
                        - lblHdrKP:
                            Control: ModernText
                            Properties:
                              AlignInContainer: =AlignInContainer.Stretch
                              Color: =varTheme.silver
                              FillPortions: =1
                              Font: =varTheme.sans
                              FontWeight: =FontWeight.Semibold
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =10
                              Text: ="KEY PLAYER"
                              Wrap: =false
                        - lblHdrSBN:
                            Control: ModernText
                            Properties:
                              AlignInContainer: =AlignInContainer.Stretch
                              Color: =varTheme.silver
                              FillPortions: =1
                              Font: =varTheme.sans
                              FontWeight: =FontWeight.Semibold
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =10
                              Text: ="PAST SBN"
                              Wrap: =false
                  - galEmployees:
                      Control: Gallery
                      Variant: Vertical
                      Properties:
                        FillPortions: =0
                        Height: =Max(360, CountRows(Self.AllItems) * 72)
                        Items: |-
                          =SortByColumns(Filter(colEmployees,
                              (locSearch = "" || locSearch in FullName || locSearch in JobTitle)
                              && (IsBlank(locTalent) || TalentClass = locTalent)
                              && (IsBlank(locCountry) || Country = locCountry)
                              && (locTarget = "All"
                                  || (locTarget = "Yes" && KeyPlayer)
                                  || (locTarget = "No" && !KeyPlayer))),
                            "field_1",
                            If(locSortDesc, SortOrder.Descending, SortOrder.Ascending)
                          )
                        TemplateSize: =72
                      Children:
                        - rowDivider:
                            Control: Rectangle
                            Properties:
                              Fill: =varTheme.medGray
                              Height: =1
                              Width: =Parent.TemplateWidth
                              Y: =71
                        - avtEmployee:
                            Control: Avatar
                            Properties:
                              Height: =32
                              Name: =ThisItem.FullName
                              Width: =32
                              X: =16
                              Y: =20
                        - lblEmpName:
                            Control: ModernText
                            Properties:
                              Color: =varTheme.offWhite
                              Font: =varTheme.sans
                              FontWeight: =FontWeight.Semibold
                              Height: =20
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =14
                              Text: =ThisItem.FullName
                              Width: =Parent.TemplateWidth * 0.30
                              Wrap: =false
                              X: =60
                              Y: =14
                        - lblEmpJob:
                            Control: ModernText
                            Properties:
                              Color: =varTheme.silver
                              Font: =varTheme.sans
                              Height: =16
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =11
                              Text: =ThisItem.JobTitle
                              Width: =Parent.TemplateWidth * 0.30
                              Wrap: =false
                              X: =60
                              Y: =34
                        - lblEmpCountry:
                            Control: ModernText
                            Properties:
                              Color: =varTheme.lightGray
                              Font: =varTheme.sans
                              Height: =14
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =11
                              Text: ="· " & ThisItem.Country
                              Width: =Parent.TemplateWidth * 0.30
                              Wrap: =false
                              X: =60
                              Y: =50
                        - rectTalent:
                            Control: Rectangle
                            Properties:
                              BorderColor: |-
                                =Switch(ThisItem.TalentClass,
                                  "Future Leaders",    varTheme.gold,
                                  "Rising Players",    varTheme.info,
                                  "Essential Players", varTheme.success,
                                  varTheme.gray)
                              BorderThickness: =1
                              Fill: |-
                                =Switch(ThisItem.TalentClass,
                                  "Future Leaders",    varTheme.goldSoft,
                                  "Rising Players",    varTheme.infoSoft,
                                  "Essential Players", varTheme.successSoft,
