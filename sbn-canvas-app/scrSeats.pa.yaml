                                    Y: =8
                              - rowBarBg:
                                  Control: Rectangle
                                  Properties:
                                    Fill: =varTheme.medGray
                                    Height: =6
                                    Width: =Parent.TemplateWidth - 240
                                    Y: =34
                              - rowBarFill:
                                  Control: Rectangle
                                  Properties:
                                    Fill: =If(ThisItem.Seats = 0, varTheme.gold, If((ThisItem.used / ThisItem.Seats) >= 0.9, varTheme.danger, If((ThisItem.used / ThisItem.Seats) >= 0.7, varTheme.warning, varTheme.gold)))
                                    Height: =6
                                    Width: |-
                                      =If(ThisItem.Seats = 0, 0,
                                          Min(ThisItem.used / ThisItem.Seats, 1) * (Parent.TemplateWidth - 240))
                                    Y: =34
                              - rowUsedTotal:
                                  Control: Text
                                  Properties:
                                    Align: ='TextCanvas.Align'.End
