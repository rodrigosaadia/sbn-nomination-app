                                    Width: =84
                                    Wrap: =false
                                    X: =Parent.TemplateWidth - 84
                                    Y: =14
                              - setRowDivider:
                                  Control: Rectangle
                                  Properties:
                                    Fill: =varTheme.medGray
                                    Height: =1
                                    Width: =Parent.TemplateWidth
                                    Y: =60
