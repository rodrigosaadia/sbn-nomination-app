                              Y: =84
                            Children:
                              - rowCourseCode:
                                  Control: Text
                                  Properties:
                                    Align: ='TextCanvas.Align'.Start
                                    Font: =varTheme.sans
                                    FontColor: =varTheme.gold
                                    Height: =18
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =11
                                    Text: =Upper(ThisItem.Code)
                                    Weight: ='TextCanvas.Weight'.Bold
                                    Width: =100
                                    Wrap: =false
                                    Y: =8
                              - rowCourseName:
                                  Control: Text
                                  Properties:
                                    Align: ='TextCanvas.Align'.Start
                                    Font: =varTheme.sans
                                    FontColor: =varTheme.offWhite
                                    Height: =18
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =13
                                    Text: =ThisItem.CourseName
