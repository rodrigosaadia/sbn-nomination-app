                              Width: =Parent.Width-48
                              Wrap: =false
                              X: =24
                              Y: =50
                        - byCourseGallery:
                            Control: Gallery
                            Variant: Vertical
                            Properties:
                              Height: =420
                              Items: |-
                                =SortByColumns(
                                  AddColumns(
                                    colCourses,
                                    used,
                                    CountIf(colNominations,
                                      CourseID = ThisRecord.CourseID
                                      && Status <> "rejected")
                                  ),
                                  "used",
                                  SortOrder.Descending
                                )
                              TemplatePadding: =0
