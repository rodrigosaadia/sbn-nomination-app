Screens:
  scrSeats:
    Properties:
      Fill: =varTheme.black
      OnVisible: =Set(varCurrentPage, "seats")
    Children:
      - setRootSeats:
          Control: GroupContainer
          Variant: ManualLayout
          Properties:
            Fill: =varTheme.black
            Height: =Parent.Height
            Width: =Parent.Width
          Children:
            - setSidebarSeats:
                Control: GroupContainer
                Variant: ManualLayout
                Properties:
                  Fill: =varTheme.darkGray
                  Height: =Parent.Height
                  Width: =240
                Children:
                  - setSidebarRightBorderSeats:
                      Control: Rectangle
                      Properties:
                        Fill: =varTheme.medGray
                        Height: =Parent.Height
                        Width: =1
                        X: =239
                  - setSidebarWordmarkSeats:
                      Control: Label
                      Properties:
                        Align: ='TextCanvas.Align'.Start
                        Font: =varTheme.serif
                        Color: =varTheme.white
                        Fill: =RGBA(0,0,0,0)
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =22
                        Height: =32
                        Text: ="L'ORÉAL"
                        FontWeight: =FontWeight.Bold
                        Width: =200
                        Wrap: =false
                        X: =24
                        Y: =28
                  - setSidebarSubtitleSeats:
                      Control: Label
                      Properties:
                        Align: ='TextCanvas.Align'.Start
                        Font: =varTheme.sans
                        Color: =varTheme.gold
                        Fill: =RGBA(0,0,0,0)
                        Height: =16
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =9
                        Text: ="SEMINAR BY NOMINATION"
                        FontWeight: =FontWeight.Semibold
                        Width: =200
                        Wrap: =false
                        X: =24
                        Y: =62
                  - setNavDashboardSeats:
                      Control: Button
                      Properties:
                        Align: =Align.Left
                        Appearance: ='ButtonCanvas.Appearance'.Transparent
                        BorderColor: =RGBA(0,0,0,0)
                        Font: =varTheme.sans
                        FontColor: =If(varCurrentPage="dashboard", varTheme.white, varTheme.silver)
                        FontWeight: =If(varCurrentPage="dashboard", FontWeight.Semibold, FontWeight.Normal)
                        Height: =44
                        OnSelect: |-
                          =Set(varCurrentPage, "dashboard");
                          Navigate(scrDashboard, ScreenTransition.Fade)
                        PaddingLeft: =24
                        FontSize: =13
                        Text: ="Dashboard"
                        Width: =240
                        Y: =112
                  - setNavDashboardSeatsAccent:
                      Control: Rectangle
                      Properties:
                        Fill: =varTheme.gold
                        Height: =44
                        Visible: =varCurrentPage="dashboard"
                        Width: =3
                        Y: =112
                  - setNavCatalogSeats:
                      Control: Button
                      Properties:
                        Align: =Align.Left
                        Appearance: ='ButtonCanvas.Appearance'.Transparent
                        BorderColor: =RGBA(0,0,0,0)
                        Font: =varTheme.sans
                        FontColor: =If(varCurrentPage="catalog", varTheme.white, varTheme.silver)
                        FontWeight: =If(varCurrentPage="catalog", FontWeight.Semibold, FontWeight.Normal)
                        Height: =44
                        OnSelect: |-
                          =Set(varCurrentPage, "catalog");
                          Navigate(scrCatalog, ScreenTransition.Fade)
                        PaddingLeft: =24
                        FontSize: =13
                        Text: ="Courses"
                        Width: =240
                        Y: =156
                  - setNavCatalogSeatsAccent:
                      Control: Rectangle
                      Properties:
                        Fill: =varTheme.gold
                        Height: =44
                        Visible: =varCurrentPage="catalog"
                        Width: =3
                        Y: =156
                  - setNavEmployeesSeats:
                      Control: Button
                      Properties:
                        Align: =Align.Left
                        Appearance: ='ButtonCanvas.Appearance'.Transparent
                        BorderColor: =RGBA(0,0,0,0)
                        Font: =varTheme.sans
                        FontColor: =If(varCurrentPage="employees", varTheme.white, varTheme.silver)
                        FontWeight: =If(varCurrentPage="employees", FontWeight.Semibold, FontWeight.Normal)
                        Height: =44
                        OnSelect: |-
                          =Set(varCurrentPage, "employees");
                          Navigate(scrEmployees, ScreenTransition.Fade)
                        PaddingLeft: =24
                        FontSize: =13
                        Text: ="Employees"
                        Width: =240
                        Y: =200
                  - setNavEmployeesSeatsAccent:
                      Control: Rectangle
                      Properties:
                        Fill: =varTheme.gold
                        Height: =44
                        Visible: =varCurrentPage="employees"
                        Width: =3
                        Y: =200
                  - setNavNominationsSeats:
                      Control: Button
                      Properties:
                        Align: =Align.Left
                        Appearance: ='ButtonCanvas.Appearance'.Transparent
                        BorderColor: =RGBA(0,0,0,0)
                        Font: =varTheme.sans
                        FontColor: =If(varCurrentPage="nominations", varTheme.white, varTheme.silver)
                        FontWeight: =If(varCurrentPage="nominations", FontWeight.Semibold, FontWeight.Normal)
                        Height: =44
                        OnSelect: |-
                          =Set(varCurrentPage, "nominations");
                          Navigate(scrNominations, ScreenTransition.Fade)
                        PaddingLeft: =24
                        FontSize: =13
                        Text: ="Nominations"
                        Width: =240
                        Y: =244
                  - setNavNominationsSeatsAccent:
                      Control: Rectangle
                      Properties:
                        Fill: =varTheme.gold
                        Height: =44
                        Visible: =varCurrentPage="nominations"
                        Width: =3
                        Y: =244
                  - setNavSeatsSeats:
                      Control: Button
                      Properties:
                        Align: =Align.Left
                        Appearance: ='ButtonCanvas.Appearance'.Transparent
                        BorderColor: =RGBA(0,0,0,0)
                        Font: =varTheme.sans
                        FontColor: =If(varCurrentPage="seats", varTheme.white, varTheme.silver)
                        FontWeight: =If(varCurrentPage="seats", FontWeight.Semibold, FontWeight.Normal)
                        Height: =44
                        OnSelect: |-
                          =Set(varCurrentPage, "seats");
                          Navigate(scrSeats, ScreenTransition.Fade)
                        PaddingLeft: =24
                        FontSize: =13
                        Text: ="Seats"
                        Width: =240
                        Y: =288
                  - setNavSeatsSeatsAccent:
                      Control: Rectangle
                      Properties:
                        Fill: =varTheme.gold
                        Height: =44
                        Visible: =varCurrentPage="seats"
                        Width: =3
                        Y: =288
                  - setNavPdlSeats:
                      Control: Button
                      Properties:
                        Align: =Align.Left
                        Appearance: ='ButtonCanvas.Appearance'.Transparent
                        BorderColor: =RGBA(0,0,0,0)
                        Font: =varTheme.sans
                        FontColor: =If(varCurrentPage="pdl", varTheme.white, varTheme.silver)
                        FontWeight: =If(varCurrentPage="pdl", FontWeight.Semibold, FontWeight.Normal)
                        Height: =44
                        OnSelect: |-
                          =Set(varCurrentPage, "pdl");
                          Navigate(scrPDLLatam, ScreenTransition.Fade)
                        PaddingLeft: =24
                        FontSize: =13
                        Text: ="PDL LATAM"
                        Width: =240
                        Y: =332
                  - setNavPdlSeatsAccent:
                      Control: Rectangle
                      Properties:
                        Fill: =varTheme.gold
                        Height: =44
                        Visible: =varCurrentPage="pdl"
                        Width: =3
                        Y: =332
                  - setNavCriteriaSeats:
                      Control: Button
                      Properties:
                        Align: =Align.Left
                        Appearance: ='ButtonCanvas.Appearance'.Transparent
                        BorderColor: =RGBA(0,0,0,0)
                        Font: =varTheme.sans
                        FontColor: =If(varCurrentPage="criteria", varTheme.white, varTheme.silver)
                        FontWeight: =If(varCurrentPage="criteria", FontWeight.Semibold, FontWeight.Normal)
                        Height: =44
                        OnSelect: |-
                          =Set(varCurrentPage, "criteria");
                          Navigate(scrCriteria, ScreenTransition.Fade)
                        PaddingLeft: =24
                        FontSize: =13
                        Text: ="Criteria"
                        Width: =240
                        Y: =376
                  - setNavCriteriaSeatsAccent:
                      Control: Rectangle
                      Properties:
                        Fill: =varTheme.gold
                        Height: =44
                        Visible: =varCurrentPage="criteria"
                        Width: =3
                        Y: =376
                  - setSidebarFooterDivSeats:
                      Control: Rectangle
                      Properties:
                        Fill: =varTheme.medGray
                        Height: =1
                        Width: =192
                        X: =24
                        Y: =Parent.Height-104
                  - setSidebarFooterNameSeats:
                      Control: Text
                      Properties:
                        Align: ='TextCanvas.Align'.Start
                        Font: =varTheme.sans
                        FontColor: =varTheme.offWhite
                        Height: =18
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =13
                        Text: =varCurrentUser.name
                        Weight: ='TextCanvas.Weight'.Semibold
                        Width: =200
                        Wrap: =false
                        X: =24
                        Y: =Parent.Height-88
                  - setSidebarFooterRoleSeats:
                      Control: Text
                      Properties:
                        Align: ='TextCanvas.Align'.Start
                        Font: =varTheme.sans
                        FontColor: =varTheme.lightGray
                        Height: =16
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =11
                        Text: =varCurrentUser.role
                        Weight: ='TextCanvas.Weight'.Regular
                        Width: =200
                        Wrap: =false
                        X: =24
                        Y: =Parent.Height-66
                  - setSidebarFooterEmailSeats:
                      Control: Text
                      Properties:
                        Align: ='TextCanvas.Align'.Start
                        Font: =varTheme.sans
                        FontColor: =varTheme.lightGray
                        Height: =16
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =10
                        Text: =varCurrentUser.email
                        Weight: ='TextCanvas.Weight'.Regular
                        Width: =200
                        Wrap: =false
                        X: =24
                        Y: =Parent.Height-46
            - contentSeats:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Fill: =varTheme.black
                  Height: =Parent.Height
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =16
                  LayoutOverflowY: =LayoutOverflow.Scroll
                  PaddingBottom: =32
                  PaddingLeft: =32
                  PaddingRight: =32
                  PaddingTop: =32
                  Width: =Parent.Width-240
                  X: =240
                Children:
                  - headerSeats:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =RGBA(0,0,0,0)
                        FillPortions: =0
                        Height: =84
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =6
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                      Children:
                        - headerTitleSeats:
                            Control: Text
                            Properties:
                              Align: ='TextCanvas.Align'.Start
                              AlignInContainer: =AlignInContainer.Stretch
                              Font: =varTheme.serif
                              FontColor: =varTheme.white
                              Height: =44
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =36
                              Text: ="Seats & Budget"
                              Weight: ='TextCanvas.Weight'.Bold
                              Wrap: =false
                        - headerSubtitleSeats:
                            Control: Text
                            Properties:
                              Align: ='TextCanvas.Align'.Start
                              AlignInContainer: =AlignInContainer.Stretch
                              Font: =varTheme.sans
                              FontColor: =varTheme.silver
                              Height: =22
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =13
                              Text: ="Country and course seat / budget utilization across LATAM"
                              Weight: ='TextCanvas.Weight'.Regular
                              Wrap: =false
                  - kpiRowSeats:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =RGBA(0,0,0,0)
                        FillPortions: =0
                        Height: =120
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =16
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                      Children:
                        - kpiSeatsUsed:
                            Control: GroupContainer
                            Variant: ManualLayout
                            Properties:
                              BorderColor: =varTheme.lightGray
                              BorderThickness: =1
                              Fill: =varTheme.darkGray
                              LayoutMinHeight: =0
                              LayoutMinWidth: =0
                              RadiusBottomLeft: =8
                              RadiusBottomRight: =8
                              RadiusTopLeft: =8
                              RadiusTopRight: =8
                            Children:
                              - kpiSeatsUsedLabel:
                                  Control: Text
                                  Properties:
                                    Align: ='TextCanvas.Align'.Start
                                    Font: =varTheme.sans
                                    FontColor: =varTheme.silver
                                    Height: =18
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =11
                                    Text: ="SEATS USED"
                                    Weight: ='TextCanvas.Weight'.Semibold
                                    Width: =Parent.Width-32
                                    Wrap: =false
                                    X: =16
                                    Y: =16
                              - kpiSeatsUsedValue:
                                  Control: Text
                                  Properties:
                                    Align: ='TextCanvas.Align'.Start
                                    Font: =varTheme.serif
                                    FontColor: =varTheme.white
                                    Height: =40
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =28
                                    Text: =Text(CountIf(colNominations, Status <> "rejected"))
                                    Weight: ='TextCanvas.Weight'.Bold
                                    Width: =Parent.Width-32
                                    Wrap: =false
                                    X: =16
                                    Y: =42
                              - kpiSeatsUsedSub:
                                  Control: Text
                                  Properties:
                                    Align: ='TextCanvas.Align'.Start
                                    Font: =varTheme.sans
                                    FontColor: =varTheme.gold
                                    Height: =18
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =11
                                    Text: ="of " & Sum(colCountrySeats, seats) & " total"
                                    Weight: ='TextCanvas.Weight'.Regular
                                    Width: =Parent.Width-32
                                    Wrap: =false
                                    X: =16
                                    Y: =86
                        - kpiSeatsAvailable:
                            Control: GroupContainer
                            Variant: ManualLayout
                            Properties:
                              BorderColor: =varTheme.lightGray
                              BorderThickness: =1
                              Fill: =varTheme.darkGray
                              LayoutMinHeight: =0
                              LayoutMinWidth: =0
                              RadiusBottomLeft: =8
                              RadiusBottomRight: =8
                              RadiusTopLeft: =8
                              RadiusTopRight: =8
                            Children:
                              - kpiSeatsAvailLabel:
                                  Control: Text
                                  Properties:
                                    Align: ='TextCanvas.Align'.Start
                                    Font: =varTheme.sans
                                    FontColor: =varTheme.silver
                                    Height: =18
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =11
                                    Text: ="SEATS AVAILABLE"
                                    Weight: ='TextCanvas.Weight'.Semibold
                                    Width: =Parent.Width-32
                                    Wrap: =false
                                    X: =16
                                    Y: =16
                              - kpiSeatsAvailValue:
                                  Control: Text
                                  Properties:
                                    Align: ='TextCanvas.Align'.Start
                                    Font: =varTheme.serif
                                    FontColor: =varTheme.white
                                    Height: =40
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =28
                                    Text: =Text(Sum(colCountrySeats, seats) - CountIf(colNominations, Status <> "rejected"))
                                    Weight: ='TextCanvas.Weight'.Bold
                                    Width: =Parent.Width-32
                                    Wrap: =false
                                    X: =16
                                    Y: =42
                              - kpiSeatsAvailSub:
                                  Control: Text
                                  Properties:
                                    Align: ='TextCanvas.Align'.Start
                                    Font: =varTheme.sans
                                    FontColor: =varTheme.gold
                                    Height: =18
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =11
                                    Text: |-
                                      =Text(
                                        If(Sum(colCountrySeats, seats) = 0, 0,
                                           CountIf(colNominations, Status <> "rejected") / Sum(colCountrySeats, seats)),
                                        "0%"
                                      ) & " utilization"
                                    Weight: ='TextCanvas.Weight'.Regular
                                    Width: =Parent.Width-32
                                    Wrap: =false
                                    X: =16
                                    Y: =86
                        - kpiBudgetUsed:
                            Control: GroupContainer
                            Variant: ManualLayout
                            Properties:
                              BorderColor: =varTheme.lightGray
                              BorderThickness: =1
                              Fill: =varTheme.darkGray
                              LayoutMinHeight: =0
                              LayoutMinWidth: =0
                              RadiusBottomLeft: =8
                              RadiusBottomRight: =8
                              RadiusTopLeft: =8
                              RadiusTopRight: =8
                            Children:
                              - kpiBudgetUsedLabel:
                                  Control: Text
                                  Properties:
                                    Align: ='TextCanvas.Align'.Start
                                    Font: =varTheme.sans
                                    FontColor: =varTheme.silver
                                    Height: =18
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =11
                                    Text: ="BUDGET USED"
                                    Weight: ='TextCanvas.Weight'.Semibold
                                    Width: =Parent.Width-32
                                    Wrap: =false
                                    X: =16
                                    Y: =16
                              - kpiBudgetUsedValue:
                                  Control: Text
                                  Properties:
                                    Align: ='TextCanvas.Align'.Start
                                    Font: =varTheme.serif
                                    FontColor: =varTheme.white
                                    Height: =40
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =28
                                    Text: =Text(Sum(Filter(colNominations, Status <> "rejected"), Investment), "[$-en-US]$#,##0")
                                    Weight: ='TextCanvas.Weight'.Bold
                                    Width: =Parent.Width-32
                                    Wrap: =false
                                    X: =16
                                    Y: =42
                              - kpiBudgetUsedSub:
                                  Control: Text
                                  Properties:
                                    Align: ='TextCanvas.Align'.Start
                                    Font: =varTheme.sans
                                    FontColor: =varTheme.gold
                                    Height: =18
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =11
                                    Text: ="of " & Text(Sum(colCountrySeats, budget), "[$-en-US]$#,##0") & " total"
                                    Weight: ='TextCanvas.Weight'.Regular
                                    Width: =Parent.Width-32
                                    Wrap: =false
                                    X: =16
                                    Y: =86
                        - kpiBudgetAvail:
                            Control: GroupContainer
                            Variant: ManualLayout
                            Properties:
                              BorderColor: =varTheme.lightGray
                              BorderThickness: =1
                              Fill: =varTheme.darkGray
                              LayoutMinHeight: =0
                              LayoutMinWidth: =0
                              RadiusBottomLeft: =8
                              RadiusBottomRight: =8
                              RadiusTopLeft: =8
                              RadiusTopRight: =8
                            Children:
                              - kpiBudgetAvailLabel:
                                  Control: Text
                                  Properties:
                                    Align: ='TextCanvas.Align'.Start
                                    Font: =varTheme.sans
                                    FontColor: =varTheme.silver
                                    Height: =18
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =11
                                    Text: ="BUDGET AVAILABLE"
                                    Weight: ='TextCanvas.Weight'.Semibold
                                    Width: =Parent.Width-32
                                    Wrap: =false
                                    X: =16
                                    Y: =16
                              - kpiBudgetAvailValue:
                                  Control: Text
                                  Properties:
                                    Align: ='TextCanvas.Align'.Start
                                    Font: =varTheme.serif
                                    FontColor: =varTheme.white
                                    Height: =40
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =28
                                    Text: =Text(Sum(colCountrySeats, budget) - Sum(Filter(colNominations, Status <> "rejected"), Investment), "[$-en-US]$#,##0")
                                    Weight: ='TextCanvas.Weight'.Bold
                                    Width: =Parent.Width-32
                                    Wrap: =false
                                    X: =16
                                    Y: =42
                              - kpiBudgetAvailSub:
                                  Control: Text
                                  Properties:
                                    Align: ='TextCanvas.Align'.Start
                                    Font: =varTheme.sans
                                    FontColor: =varTheme.gold
                                    Height: =18
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =11
                                    Text: |-
                                      =Text(
                                        If(Sum(colCountrySeats, budget) = 0, 0,
                                           Sum(Filter(colNominations, Status <> "rejected"), Investment) / Sum(colCountrySeats, budget)),
                                        "0%"
                                      ) & " utilization"
                                    Weight: ='TextCanvas.Weight'.Regular
                                    Width: =Parent.Width-32
                                    Wrap: =false
                                    X: =16
                                    Y: =86
                  - byCountryCard:
                      Control: GroupContainer
                      Variant: ManualLayout
                      Properties:
                        BorderColor: =varTheme.lightGray
                        BorderThickness: =1
                        Fill: =varTheme.darkGray
                        FillPortions: =0
                        Height: =360
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =8
                        RadiusBottomRight: =8
                        RadiusTopLeft: =8
                        RadiusTopRight: =8
                      Children:
                        - byCountryTitle:
                            Control: Text
                            Properties:
                              Align: ='TextCanvas.Align'.Start
                              Font: =varTheme.serif
                              FontColor: =varTheme.white
                              Height: =28
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =20
                              Text: ="Seats & Budget by Country"
                              Weight: ='TextCanvas.Weight'.Semibold
                              Width: =Parent.Width-48
                              Wrap: =false
                              X: =24
                              Y: =20
                        - byCountrySubtitle:
                            Control: Text
                            Properties:
                              Align: ='TextCanvas.Align'.Start
                              Font: =varTheme.sans
                              FontColor: =varTheme.silver
                              Height: =18
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =11
                              Text: ="Utilization of seat quota and budget per LATAM country"
                              Weight: ='TextCanvas.Weight'.Regular
                              Width: =Parent.Width-48
                              Wrap: =false
                              X: =24
                              Y: =50
                        - byCountryGallery:
                            Control: Gallery
                            Variant: Horizontal
                            Properties:
                              Height: =256
                              Items: =colCountrySeats
                              ShowScrollbar: =false
                              TemplatePadding: =0
                              TemplateSize: =(Parent.Width-48) / 5
                              Width: =Parent.Width-48
                              X: =24
                              Y: =84
                            Children:
                              - gaugeFgArc:
                                  Control: Circle
                                  Properties:
                                    BorderColor: |-
                                      =If(ThisItem.seats = 0, varTheme.gold, If((CountIf(colNominations, LookUp(colEmployees, CarolID = ThisRecord.CarolID).Country = ThisItem.country && Status <> "rejected") / ThisItem.seats) >= 0.9, varTheme.danger, If((CountIf(colNominations, LookUp(colEmployees, CarolID = ThisRecord.CarolID).Country = ThisItem.country && Status <> "rejected") / ThisItem.seats) >= 0.7, varTheme.warning, varTheme.gold)))
                                    BorderThickness: =5
                                    Fill: =RGBA(0,0,0,0)
                                    Height: =110
                                    Width: =110
                                    X: =(Parent.TemplateWidth - 110) / 2
                                    Y: =16
                              - gaugeCenterValue:
                                  Control: Text
                                  Properties:
                                    Align: ='TextCanvas.Align'.Center
                                    Font: =varTheme.serif
                                    FontColor: =varTheme.white
                                    Height: =30
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =22
                                    Text: |-
                                      =Text(CountIf(colNominations,
                                        LookUp(colEmployees, CarolID = ThisRecord.CarolID).Country = ThisItem.country
                                        && Status <> "rejected"))
                                    Weight: ='TextCanvas.Weight'.Bold
                                    Width: =110
                                    Wrap: =false
                                    X: =(Parent.TemplateWidth - 110) / 2
                                    Y: =50
                              - gaugeCenterTotal:
                                  Control: Text
                                  Properties:
                                    Align: ='TextCanvas.Align'.Center
                                    Font: =varTheme.sans
                                    FontColor: =varTheme.silver
                                    Height: =16
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =11
                                    Text: ="/ " & ThisItem.seats
                                    Weight: ='TextCanvas.Weight'.Regular
                                    Width: =110
                                    Wrap: =false
                                    X: =(Parent.TemplateWidth - 110) / 2
                                    Y: =80
                              - gaugeLabel:
                                  Control: Text
                                  Properties:
                                    Align: ='TextCanvas.Align'.Center
                                    Font: =varTheme.sans
                                    FontColor: =varTheme.offWhite
                                    Height: =20
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =13
                                    Text: =ThisItem.country
                                    Weight: ='TextCanvas.Weight'.Semibold
                                    Width: =Parent.TemplateWidth
                                    Wrap: =false
                                    Y: =140
                              - budgetBarBg:
                                  Control: Rectangle
                                  Properties:
                                    Fill: =varTheme.medGray
                                    Height: =6
                                    Width: =Parent.TemplateWidth - 32
                                    X: =16
                                    Y: =174
                              - budgetBarFill:
                                  Control: Rectangle
                                  Properties:
                                    Fill: |-
                                      =If(ThisItem.budget = 0, varTheme.gold, If((Sum(Filter(colNominations,
                                          LookUp(colEmployees, CarolID = ThisRecord.CarolID).Country = ThisItem.country
                                          && Status <> "rejected"), Investment) / ThisItem.budget) >= 0.9, varTheme.danger, If((Sum(Filter(colNominations,
                                          LookUp(colEmployees, CarolID = ThisRecord.CarolID).Country = ThisItem.country
                                          && Status <> "rejected"), Investment) / ThisItem.budget) >= 0.7, varTheme.warning, varTheme.gold)))
                                    Height: =6
                                    Width: |-
                                      =With(
                                        { used: Sum(Filter(colNominations,
                                                   LookUp(colEmployees, CarolID = ThisRecord.CarolID).Country = ThisItem.country
                                                   && Status <> "rejected"), Investment) },
                                        If(ThisItem.budget = 0, 0,
                                           Min(used / ThisItem.budget, 1) * (Parent.TemplateWidth - 32))
                                      )
                                    X: =16
                                    Y: =174
                              - budgetCaption:
                                  Control: Text
                                  Properties:
                                    Align: ='TextCanvas.Align'.Center
                                    Font: =varTheme.sans
                                    FontColor: =varTheme.lightGray
                                    Height: =16
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =10
                                    Text: |-
                                      =Text(Sum(Filter(colNominations,
                                              LookUp(colEmployees, CarolID = ThisRecord.CarolID).Country = ThisItem.country
                                              && Status <> "rejected"), Investment),
                                           "[$-en-US]$#,##0")
                                        & " / " & Text(ThisItem.budget, "[$-en-US]$#,##0")
                                    Weight: ='TextCanvas.Weight'.Regular
                                    Width: =Parent.TemplateWidth - 32
                                    Wrap: =false
                                    X: =16
                                    Y: =188
                  - byCourseCard:
