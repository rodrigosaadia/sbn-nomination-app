                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =13
                                    Text: =ThisItem.used & " / " & ThisItem.Seats & " seats"
                                    Weight: ='TextCanvas.Weight'.Semibold
                                    Width: =140
                                    Wrap: =false
                                    X: =Parent.TemplateWidth - 232
                                    Y: =8
                              - rowBadgeBg:
                                  Control: Rectangle
                                  Properties:
                                    Fill: |-
                                      =If(ThisItem.used >= ThisItem.Seats, varTheme.dangerSoft,
                                         If(ThisItem.Seats - ThisItem.used <= 3, varTheme.warningSoft,
                                            varTheme.successSoft))
                                    Height: =22
                                    Width: =84
                                    X: =Parent.TemplateWidth - 84
                                    Y: =14
                              - rowBadgeText:
                                  Control: Text
                                  Properties:
                                    Align: ='TextCanvas.Align'.Center
                                    Font: =varTheme.sans
                                    FontColor: |-
                                      =If(ThisItem.used >= ThisItem.Seats, varTheme.danger,
                                         If(ThisItem.Seats - ThisItem.used <= 3, varTheme.warning,
                                            varTheme.success))
                                    Height: =22
                                    PaddingBottom: =2
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =2
                                    Size: =11
                                    Text: |-
                                      =If(ThisItem.used >= ThisItem.Seats, "Full",
                                         If(ThisItem.Seats - ThisItem.used <= 3, (ThisItem.Seats - ThisItem.used) & " left",
                                            "OK"))
