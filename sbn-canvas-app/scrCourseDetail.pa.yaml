                        FontWeight: =If(varCurrentPage = "seats", FontWeight.Semibold, FontWeight.Normal)
                        Height: =44
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =13
                        Text: ="Seats"
                        Width: =200
                        Wrap: =false
                        X: =24
                        Y: =304
                  - cdtNavSeatsBtn:
                      Control: Button
                      Properties:
                        Appearance: ='ButtonCanvas.Appearance'.Transparent
                        Height: =44
                        OnSelect: =Set(varCurrentPage, "seats"); Navigate(scrSeats, ScreenTransition.Fade)
