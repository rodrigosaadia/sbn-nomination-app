                  - cdtNavSeatsBg:
                      Control: Rectangle
                      Properties:
                        Fill: =If(varCurrentPage = "seats", varTheme.goldSoft, RGBA(0,0,0,0))
                        Height: =44
                        Width: =240
                        Y: =304
                  - cdtNavSeatsLabel:
                      Control: Label
                      Properties:
                        Color: =If(varCurrentPage = "seats", varTheme.white, varTheme.silver)
