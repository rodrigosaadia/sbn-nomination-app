                              - btnFormConfirm:
                                  Control: Button
                                  Properties:
                                    AlignInContainer: =AlignInContainer.Center
                                    BasePaletteColor: =varTheme.gold
                                    DisplayMode: =If(Len(locJustification) > 0 && (!locFormException || Len(locOverrideReason) > 0), DisplayMode.Edit, DisplayMode.Disabled)
                                    Height: =40
                                    OnSelect: |-
                                      =With(
                                        { newId: "NOM-" & Text(Now(), "yymmddhhmmss") },
                                        Patch(
                                          '04_Nominations',
                                          Defaults('04_Nominations'),
                                          {
                                            Title:   newId,
                                            field_1:        Value(locFormEmp.CarolID),
                                            field_3:       Value(varSelectedCourse.CourseID),
                                            field_6:     varSelectedCourse.Investment,
                                            field_7:       ((varSelectedCourse.MinMonthsCompany <= 0 || locFormEmp.MonthsCompany >= varSelectedCourse.MinMonthsCompany) && (varSelectedCourse.MinMonthsDivision <= 0 || locFormEmp.MonthsDivision >= varSelectedCourse.MinMonthsDivision) && (varSelectedCourse.MaxAge <= 0 || locFormEmp.Age <= varSelectedCourse.MaxAge) && (IsBlank(varSelectedCourse.RequiredCourseCode) || varSelectedCourse.RequiredCourseCode = "" || varSelectedCourse.RequiredCourseCode in Split(Coalesce(locFormEmp.CompletedCourses, ""), ",")) && ((varSelectedCourse.DivisionRangeMin <= 0 && varSelectedCourse.DivisionRangeMax <= 0) || (locFormEmp.MonthsDivision >= varSelectedCourse.DivisionRangeMin && locFormEmp.MonthsDivision <= varSelectedCourse.DivisionRangeMax))),
                                            field_8:    locFormException,
                                            field_9: locOverrideReason,
                                            field_10:          (Switch(locFormEmp.TalentClass, "Future Leaders", 30, "Rising Players", 22, "Essential Players", 15, 0) + If(locFormEmp.SuccessionPipeline = "Yes", 20, 0) + Switch(locFormEmp.PastSBNCount, 0, 15, 1, 5, 0) + Switch(locFormEmp.FlightRisk, "High", 15, "Medium", 8, 0) + Switch(locFormEmp.Performance, "Exceeds Expectations", 20, "Strong Performer", 14, "Meets Expectations", 8, 3)),
                                            field_11: "nominated",
                                            field_12:    Now(),
                                            field_13:  locJustification,
                                            field_14: varCurrentUser.role,
                                            field_15: varCurrentUser.email,
                                            field_16:       Blank()
                                          }
                                        );
                                        Patch(
                                          '05_NominationHistory',
                                          Defaults('05_NominationHistory'),
                                          {
                                            Title:        newId & "-create",
                                            field_1: newId,
                                            field_2: "created",
                                            field_3:    varCurrentUser.email,
                                            field_4:     varCurrentUser.name,
                                            field_5:    Now(),
                                            field_6:      "Nominated for " & varSelectedCourse.CourseName & If(locFormException, " (Exception - Out of Target): " & locOverrideReason, "")
                                          }
                                        )
                                      );
                                      ClearCollect(colNominations, '04_Nominations');
                                      ClearCollect(colHistory, '05_NominationHistory');
                                      Set(varShowNominationForm, false);
                                      Notify("Nomination created.", NotificationType.Success)
                                    Text: ="Confirm Nomination"
                                    Width: =180

