                        Y: =348
                  - cdtNavPdlBg:
                      Control: Rectangle
                      Properties:
                        Fill: =If(varCurrentPage = "pdl", varTheme.goldSoft, RGBA(0,0,0,0))
                        Height: =44
                        Width: =240
                        Y: =348
                  - cdtNavPdlLabel:
                      Control: Label
                      Properties:
                        Color: =If(varCurrentPage = "pdl", varTheme.white, varTheme.silver)
