                        Height: =44
                        OnSelect: =Set(varCurrentPage, "pdl"); Navigate(scrPDLLatam, ScreenTransition.Fade)
                        Text: =""
                        Width: =240
                        Y: =348
                  - cdtNavCriteriaBorder:
                      Control: Rectangle
                      Properties:
                        Fill: =varTheme.gold
                        Height: =44
                        Visible: =varCurrentPage = "criteria"
                        Width: =3
                        Y: =392
                  - cdtNavCriteriaBg:
                      Control: Rectangle
                      Properties:
                        Fill: =If(varCurrentPage = "criteria", varTheme.goldSoft, RGBA(0,0,0,0))
                        Height: =44
                        Width: =240
                        Y: =392
                  - cdtNavCriteriaLabel:
                      Control: Label
                      Properties:
                        Color: =If(varCurrentPage = "criteria", varTheme.white, varTheme.silver)
                        Fill: =RGBA(0,0,0,0)
                        Font: =varTheme.sans
                        FontWeight: =If(varCurrentPage = "criteria", FontWeight.Semibold, FontWeight.Normal)
                        Height: =44
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =13
                        Text: ="Criteria"
                        Width: =200
                        Wrap: =false
                        X: =24
                        Y: =392
                  - cdtNavCriteriaBtn:
                      Control: Button
                      Properties:
                        Appearance: ='ButtonCanvas.Appearance'.Transparent
                        Height: =44
                        OnSelect: =Set(varCurrentPage, "criteria"); Navigate(scrCriteria, ScreenTransition.Fade)
                        Text: =""
                        Width: =240
                        Y: =392
                  - cdtSidebarFooterDivider:
                      Control: Rectangle
                      Properties:
                        Fill: =varTheme.medGray
                        Height: =1
                        Width: =192
                        X: =24
                        Y: =Parent.Height - 110
                  - cdtSidebarFooterName:
                      Control: Label
                      Properties:
                        Color: =varTheme.offWhite
                        Font: =varTheme.sans
                        FontWeight: =FontWeight.Semibold
                        Height: =20
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Text: =varCurrentUser.name
                        Width: =192
                        Wrap: =false
                        X: =24
                        Y: =Parent.Height - 96
                  - cdtSidebarFooterRole:
                      Control: Label
                      Properties:
                        Color: =varTheme.lightGray
                        Font: =varTheme.sans
                        Height: =16
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =11
                        Text: =varCurrentUser.role
                        Width: =192
                        Wrap: =false
                        X: =24
                        Y: =Parent.Height - 74
                  - cdtSidebarFooterEmail:
                      Control: Label
                      Properties:
                        Color: =varTheme.lightGray
                        Font: =varTheme.sans
                        Height: =16
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =10
                        Text: =varCurrentUser.email
                        Width: =192
                        Wrap: =false
                        X: =24
                        Y: =Parent.Height - 56
            - cdtGrpContent:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Height: =Parent.Height
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =24
                  LayoutOverflowY: =LayoutOverflow.Scroll
                  PaddingBottom: =32
                  PaddingLeft: =32
                  PaddingRight: =32
                  PaddingTop: =32
                  Width: =Parent.Width - 240
                  X: =240
                Children:
                  - grpBackRow:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        FillPortions: =0
                        Height: =40
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                      Children:
                        - btnBack:
                            Control: Button
                            Properties:
                              AlignInContainer: =AlignInContainer.Center
                              Appearance: ='ButtonCanvas.Appearance'.Transparent
                              BasePaletteColor: =varTheme.gold
                              Height: =40
                              OnSelect: =Navigate(scrCatalog, ScreenTransition.Fade)
                              Text: ="< Back to Catalog"
                              Width: =200
                  - cardCourseHeader:
                      Control: GroupContainer
                      Variant: ManualLayout
                      Properties:
                        BorderColor: =varTheme.lightGray
                        BorderThickness: =1
                        Fill: =varTheme.darkGray
                        FillPortions: =0
                        Height: =320
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =8
                        RadiusBottomRight: =8
                        RadiusTopLeft: =8
                        RadiusTopRight: =8
                      Children:
                        - grpCourseHeaderInner:
                            Control: GroupContainer
                            Variant: AutoLayout
                            Properties:
                              Height: =Parent.Height
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =24
                              PaddingBottom: =24
                              PaddingLeft: =24
                              PaddingRight: =24
                              PaddingTop: =24
                              Width: =Parent.Width
                            Children:
                              - grpCourseHeaderLeft:
                                  Control: GroupContainer
                                  Variant: AutoLayout
                                  Properties:
                                    LayoutAlignItems: =LayoutAlignItems.Stretch
                                    LayoutDirection: =LayoutDirection.Vertical
                                    LayoutGap: =12
                                    LayoutMinHeight: =0
                                    LayoutMinWidth: =0
                                  Children:
                                    - lblCourseCode:
                                        Control: Label
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Stretch
                                          Color: =varTheme.gold
                                          Font: =varTheme.sans
                                          FontWeight: =FontWeight.Bold
                                          Height: =18
                                          PaddingBottom: =0
                                          PaddingLeft: =0
                                          PaddingRight: =0
                                          PaddingTop: =0
                                          Size: =12
                                          Text: =Upper(Coalesce(varSelectedCourse.Code, ""))
                                          Wrap: =false
                                    - lblCourseName:
                                        Control: Label
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Stretch
                                          AutoHeight: =true
                                          Color: =varTheme.white
                                          Font: =varTheme.serif
                                          FontWeight: =FontWeight.Bold
                                          Height: =44
                                          PaddingBottom: =0
                                          PaddingLeft: =0
                                          PaddingRight: =0
                                          PaddingTop: =0
                                          Size: =28
                                          Text: =Coalesce(varSelectedCourse.CourseName, "")
                                          Wrap: =false
                                    - lblCourseDescription:
                                        Control: Label
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Stretch
                                          AutoHeight: =true
                                          Color: =varTheme.silver
                                          Font: =varTheme.sans
                                          Height: =54
                                          PaddingBottom: =0
                                          PaddingLeft: =0
                                          PaddingRight: =0
                                          PaddingTop: =0
                                          Text: =Coalesce(varSelectedCourse.Description, "")
                                    - lblCourseObjective:
                                        Control: Label
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Stretch
                                          AutoHeight: =true
                                          Color: =varTheme.offWhite
                                          Font: =varTheme.sans
                                          Height: =54
                                          PaddingBottom: =0
                                          PaddingLeft: =0
                                          PaddingRight: =0
                                          PaddingTop: =0
                                          Text: =Coalesce(varSelectedCourse.Objective, "")
                                    - grpMetaStrip:
                                        Control: GroupContainer
                                        Variant: AutoLayout
                                        Properties:
                                          FillPortions: =0
                                          Height: =36
                                          LayoutAlignItems: =LayoutAlignItems.Center
                                          LayoutDirection: =LayoutDirection.Horizontal
                                          LayoutGap: =16
                                          LayoutMinHeight: =0
                                          LayoutMinWidth: =0
                                        Children:
                                          - lblMetaSeats:
                                              Control: Label
                                              Properties:
                                                AlignInContainer: =AlignInContainer.Center
                                                Color: =varTheme.offWhite
                                                Font: =varTheme.sans
                                                FontWeight: =FontWeight.Semibold
                                                Height: =20
                                                PaddingBottom: =0
                                                PaddingLeft: =0
                                                PaddingRight: =0
                                                PaddingTop: =0
                                                Size: =11
                                                Text: |-
                                                  ="Seats: " & CountIf(colNominations, CourseID = Value(varSelectedCourse.CourseID) && Status <> "rejected") & " / " & Coalesce(varSelectedCourse.Seats, 0)
                                                Width: =160
                                                Wrap: =false
                                          - lblMetaEligible:
                                              Control: Label
                                              Properties:
                                                AlignInContainer: =AlignInContainer.Center
                                                Color: =varTheme.offWhite
                                                Font: =varTheme.sans
                                                FontWeight: =FontWeight.Semibold
                                                Height: =20
                                                PaddingBottom: =0
                                                PaddingLeft: =0
                                                PaddingRight: =0
                                                PaddingTop: =0
                                                Size: =11
                                                Text: |-
                                                  ="Eligible: " & CountIf(colEmployees, ((varSelectedCourse.MinMonthsCompany <= 0 || ThisRecord.MonthsCompany >= varSelectedCourse.MinMonthsCompany) && (varSelectedCourse.MinMonthsDivision <= 0 || ThisRecord.MonthsDivision >= varSelectedCourse.MinMonthsDivision) && (varSelectedCourse.MaxAge <= 0 || ThisRecord.Age <= varSelectedCourse.MaxAge) && (IsBlank(varSelectedCourse.RequiredCourseCode) || varSelectedCourse.RequiredCourseCode = "" || varSelectedCourse.RequiredCourseCode in Split(Coalesce(ThisRecord.CompletedCourses, ""), ",")) && ((varSelectedCourse.DivisionRangeMin <= 0 && varSelectedCourse.DivisionRangeMax <= 0) || (ThisRecord.MonthsDivision >= varSelectedCourse.DivisionRangeMin && ThisRecord.MonthsDivision <= varSelectedCourse.DivisionRangeMax))))
                                                Width: =160
                                                Wrap: =false
                                          - rectStatusBadge:
                                              Control: Rectangle
                                              Properties:
                                                AlignInContainer: =AlignInContainer.Center
                                                BorderColor: =If(varSelectedCourse.Status = "Active", varTheme.success, varTheme.danger)
                                                Fill: =If(varSelectedCourse.Status = "Active", varTheme.successSoft, varTheme.dangerSoft)
                                                Height: =24
                                                Width: =80
                              - grpCourseHeaderRight:
                                  Control: GroupContainer
                                  Variant: AutoLayout
                                  Properties:
                                    FillPortions: =0
                                    Height: =272
                                    LayoutAlignItems: =LayoutAlignItems.End
                                    LayoutDirection: =LayoutDirection.Vertical
                                    LayoutGap: =8
                                    LayoutMinHeight: =0
                                    LayoutMinWidth: =0
                                    Width: =280
                                  Children:
                                    - lblInvestmentLabel:
                                        Control: Label
                                        Properties:
                                          Align: =Align.Right
                                          AlignInContainer: =AlignInContainer.Stretch
                                          Color: =varTheme.silver
                                          Font: =varTheme.sans
                                          FontWeight: =FontWeight.Semibold
                                          Height: =18
                                          PaddingBottom: =0
                                          PaddingLeft: =0
                                          PaddingRight: =0
                                          PaddingTop: =0
                                          Size: =11
                                          Text: ="INVESTMENT"
                                          Wrap: =false
                                    - lblInvestmentValue:
                                        Control: Label
                                        Properties:
                                          Align: =Align.Right
                                          AlignInContainer: =AlignInContainer.Stretch
                                          Color: =varTheme.gold
                                          Font: =varTheme.serif
                                          FontWeight: =FontWeight.Bold
                                          Height: =42
                                          PaddingBottom: =0
                                          PaddingLeft: =0
                                          PaddingRight: =0
                                          PaddingTop: =0
                                          Size: =28
                                          Text: =Text(Coalesce(varSelectedCourse.Investment, 0), "[$-en-US]$#,##0")
                                          Wrap: =false
                                    - lblProvider:
                                        Control: Label
                                        Properties:
                                          Align: =Align.Right
                                          AlignInContainer: =AlignInContainer.Stretch
                                          Color: =varTheme.lightGray
                                          Font: =varTheme.sans
                                          Height: =20
                                          PaddingBottom: =0
                                          PaddingLeft: =0
                                          PaddingRight: =0
                                          PaddingTop: =0
                                          Size: =11
                                          Text: |-
                                            ="Provider: " & Coalesce(varSelectedCourse.Provider, "")
                                          Wrap: =false
                                    - lblDuration:
                                        Control: Label
                                        Properties:
                                          Align: =Align.Right
                                          AlignInContainer: =AlignInContainer.Stretch
                                          Color: =varTheme.lightGray
                                          Font: =varTheme.sans
                                          Height: =20
                                          PaddingBottom: =0
                                          PaddingLeft: =0
                                          PaddingRight: =0
                                          PaddingTop: =0
                                          Size: =11
                                          Text: |-
                                            ="Duration: " & Coalesce(varSelectedCourse.Duration, "")
                                          Wrap: =false
                                    - lblFormat:
                                        Control: Label
                                        Properties:
                                          Align: =Align.Right
                                          AlignInContainer: =AlignInContainer.Stretch
                                          Color: =varTheme.lightGray
                                          Font: =varTheme.sans
                                          Height: =20
                                          PaddingBottom: =0
                                          PaddingLeft: =0
                                          PaddingRight: =0
                                          PaddingTop: =0
                                          Size: =11
                                          Text: |-
                                            ="Format: " & Coalesce(varSelectedCourse.Format, "")
                                          Wrap: =false
                  - grpFilterRow:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        FillPortions: =0
                        Height: =56
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =16
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                      Children:
                        - txtSearchEmployees:
                            Control: ModernTextInput
                            Properties:
                              AlignInContainer: =AlignInContainer.Center
                              BorderColor: =varTheme.lightGray
                              Color: =varTheme.offWhite
                              Fill: =varTheme.darkGray
                              FillPortions: =1
                              Height: =44
                              OnChange: |-
                                =UpdateContext({
                                  locSearch: Self.Text
                                })
                              Placeholder: ="Search employees by name or job title..."
                        - tglShowOOT:
                            Control: Toggle
                            Properties:
                              AlignInContainer: =AlignInContainer.Center
                              Height: =44
                              Label: ="Show non-eligible"
                              OnSelect: |-
                                =UpdateContext({
                                  locShowOOT: Self.Checked
                                })
                              Width: =220
                  - lblEligibleSectionTitle:
                      Control: Label
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        Color: =varTheme.white
                        Fill: =RGBA(0,0,0,0)
                        Font: =varTheme.serif
                        FontWeight: =FontWeight.Semibold
                        Height: =28
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =20
                        Text: ="Eligible Employees"
                        Wrap: =false
                  - galEligible:
                      Control: Gallery
                      Variant: Vertical
                      Properties:
                        FillPortions: =0
                        Height: =CountRows(Self.AllItems) * 72
                        Items: |-
                          =Filter(
                            colEmployees,
                            ((varSelectedCourse.MinMonthsCompany <= 0 || ThisRecord.MonthsCompany >= varSelectedCourse.MinMonthsCompany) && (varSelectedCourse.MinMonthsDivision <= 0 || ThisRecord.MonthsDivision >= varSelectedCourse.MinMonthsDivision) && (varSelectedCourse.MaxAge <= 0 || ThisRecord.Age <= varSelectedCourse.MaxAge) && (IsBlank(varSelectedCourse.RequiredCourseCode) || varSelectedCourse.RequiredCourseCode = "" || varSelectedCourse.RequiredCourseCode in Split(Coalesce(ThisRecord.CompletedCourses, ""), ",")) && ((varSelectedCourse.DivisionRangeMin <= 0 && varSelectedCourse.DivisionRangeMax <= 0) || (ThisRecord.MonthsDivision >= varSelectedCourse.DivisionRangeMin && ThisRecord.MonthsDivision <= varSelectedCourse.DivisionRangeMax)))
                            && (locSearch = ""
                                || locSearch in FullName
                                || locSearch in JobTitle)
                          )
                        ShowScrollbar: =false
                        TemplatePadding: =0
                        TemplateSize: =72
                      Children:
                        - rowEligibleBg:
                            Control: Rectangle
                            Properties:
                              BorderColor: =varTheme.lightGray
                              BorderThickness: =1
                              Fill: =varTheme.darkGray
                              Height: =Parent.TemplateHeight - 8
                              Width: =Parent.TemplateWidth
                        - avEligible:
                            Control: Avatar
                            Properties:
                              Height: =32
                              Name: =ThisItem.FullName
                              Width: =32
                              X: =16
                              Y: =16
                        - lblEligibleName:
                            Control: Label
                            Properties:
