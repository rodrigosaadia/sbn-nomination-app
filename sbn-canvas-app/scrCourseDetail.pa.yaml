                        Width: =200
                        Wrap: =false
                        X: =24
                        Y: =172
                  - cdtNavCoursesBtn:
                      Control: Button
                      Properties:
                        Appearance: ='ButtonCanvas.Appearance'.Transparent
                        Height: =44
