Screens:
  scrCourseDetail:
    Properties:
      Fill: =varTheme.black
      # touch
      OnVisible: |-
        =Set(varCurrentPage, "catalog");
        UpdateContext({
          locSearch: "",
          locShowOOT: false,
          locFormEmp: If(false, First(colEmployees)),
          locFormException: false,
          locJustification: "",
          locOverrideReason: ""
        })
    Children:
      - cdtGrpRoot:
          Control: GroupContainer
          Variant: ManualLayout
          Properties:
            Height: =Parent.Height
            Width: =Parent.Width
          Children:
            - cdtGrpSidebar:
                Control: GroupContainer
                Variant: ManualLayout
                Properties:
                  Height: =Parent.Height
                  Width: =240
                Children:
                  - cdtSidebarBg:
                      Control: Rectangle
                      Properties:
                        BorderColor: =varTheme.lightGray
                        Fill: =varTheme.darkGray
                        Height: =Parent.Height
                        Width: =240
                  - cdtSidebarRightBorder:
                      Control: Rectangle
                      Properties:
                        Fill: =varTheme.medGray
                        Height: =Parent.Height
                        Width: =1
                        X: =239
                  - cdtSidebarWordmark:
                      Control: Label
                      Properties:
                        Color: =varTheme.white
                        Fill: =RGBA(0,0,0,0)
                        Font: =varTheme.serif
                        FontWeight: =FontWeight.Bold
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =22
                        Height: =32
                        Text: ="L'ORÉAL"
                        Width: =200
                        Wrap: =false
                        X: =24
                        Y: =28
                  - cdtSidebarSubtitle:
                      Control: Label
                      Properties:
                        Color: =varTheme.gold
                        Fill: =RGBA(0,0,0,0)
                        Font: =varTheme.sans
                        FontWeight: =FontWeight.Semibold
                        Height: =16
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =9
                        Text: ="SEMINAR BY NOMINATION"
                        Width: =200
                        Wrap: =false
                        X: =24
                        Y: =70
                  - cdtNavDashboardBorder:
                      Control: Rectangle
                      Properties:
                        Fill: =varTheme.gold
                        Height: =44
                        Visible: =varCurrentPage = "dashboard"
                        Width: =3
                        Y: =128
                  - cdtNavDashboardBg:
                      Control: Rectangle
                      Properties:
                        Fill: =If(varCurrentPage = "dashboard", varTheme.goldSoft, RGBA(0,0,0,0))
                        Height: =44
                        Width: =240
                        Y: =128
                  - cdtNavDashboardLabel:
                      Control: Label
                      Properties:
                        Color: =If(varCurrentPage = "dashboard", varTheme.white, varTheme.silver)
                        Fill: =RGBA(0,0,0,0)
                        Font: =varTheme.sans
                        FontWeight: =If(varCurrentPage = "dashboard", FontWeight.Semibold, FontWeight.Normal)
                        Height: =44
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =13
                        Text: ="Dashboard"
                        Width: =200
                        Wrap: =false
                        X: =24
                        Y: =128
                  - cdtNavDashboardBtn:
                      Control: Button
                      Properties:
                        Appearance: ='ButtonCanvas.Appearance'.Transparent
                        Height: =44
                        OnSelect: =Set(varCurrentPage, "dashboard"); Navigate(scrDashboard, ScreenTransition.Fade)
                        Text: =""
                        Width: =240
                        Y: =128
                  - cdtNavCoursesBorder:
                      Control: Rectangle
                      Properties:
                        Fill: =varTheme.gold
                        Height: =44
                        Visible: =varCurrentPage = "catalog"
                        Width: =3
                        Y: =172
                  - cdtNavCoursesBg:
                      Control: Rectangle
                      Properties:
                        Fill: =If(varCurrentPage = "catalog", varTheme.goldSoft, RGBA(0,0,0,0))
                        Height: =44
                        Width: =240
                        Y: =172
                  - cdtNavCoursesLabel:
                      Control: Label
                      Properties:
                        Color: =If(varCurrentPage = "catalog", varTheme.white, varTheme.silver)
