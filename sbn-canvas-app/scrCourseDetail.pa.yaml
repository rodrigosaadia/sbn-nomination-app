                        Appearance: ='ButtonCanvas.Appearance'.Transparent
                        Height: =44
                        OnSelect: =Set(varCurrentPage, "employees"); Navigate(scrEmployees, ScreenTransition.Fade)
                        Text: =""
                        Width: =240
                        Y: =216
                  - cdtNavNominationsBorder:
                      Control: Rectangle
                      Properties:
                        Fill: =varTheme.gold
                        Height: =44
                        Visible: =varCurrentPage = "nominations"
                        Width: =3
                        Y: =260
                  - cdtNavNominationsBg:
                      Control: Rectangle
                      Properties:
                        Fill: =If(varCurrentPage = "nominations", varTheme.goldSoft, RGBA(0,0,0,0))
                        Height: =44
                        Width: =240
                        Y: =260
                  - cdtNavNominationsLabel:
                      Control: Label
                      Properties:
                        Color: =If(varCurrentPage = "nominations", varTheme.white, varTheme.silver)
                        Fill: =RGBA(0,0,0,0)
                        Font: =varTheme.sans
                        FontWeight: =If(varCurrentPage = "nominations", FontWeight.Semibold, FontWeight.Normal)
                        Height: =44
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
