                                          Text: =ThisItem.lblText
                                          Width: =100
                                          Wrap: =false
                                          Y: =4
                                    - rectOrgTrack:
                                        Control: Rectangle
                                        Properties:
                                          Fill: =varTheme.medGray
                                          Height: =6
                                          Width: =Parent.TemplateWidth - 160
                                          X: =108
                                          Y: =14
                                    - rectOrgFill:
                                        Control: Rectangle
                                        Properties:
                                          Fill: =varTheme.gold
                                          Height: =6
                                          Width: |-
                                            =(Parent.TemplateWidth - 160) *
                                              If(20 = 0, 0,
                                                 ThisItem.nCount / 20)
                                          X: =108
                                          Y: =14
                                    - lblOrgCount:
                                        Control: Label
                                        Properties:
                                          Align: =Align.Right
                                          Color: =varTheme.gold
                                          Font: =varTheme.sans
                                          FontWeight: =FontWeight.Semibold
                                          Height: =18
                                          PaddingBottom: =0
                                          PaddingLeft: =0
                                          PaddingRight: =0
                                          PaddingTop: =0
                                          Size: =12
                                          Text: =Text(ThisItem.nCount)
                                          Width: =32
                                          Wrap: =false
                                          X: =Parent.TemplateWidth - 40
                                          Y: =4

