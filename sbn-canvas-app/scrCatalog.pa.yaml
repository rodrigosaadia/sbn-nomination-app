                        Appearance: ='ButtonCanvas.Appearance'.Transparent
                        Height: =44
                        OnSelect: |-
                          =Set(varCurrentPage, "nominations");
                          Navigate(scrNominations, ScreenTransition.Fade)
                        Text: =""
                        Width: =240
                        Y: =252
                  - recCatNavSeatsActive:
                      Control: Rectangle
                      Properties:
                        Fill: =varTheme.gold
                        Height: =44
                        Visible: =varCurrentPage = "seats"
                        Width: =3
                        Y: =296
                  - recCatNavSeatsBg:
                      Control: Rectangle
                      Properties:
                        Fill: =If(varCurrentPage = "seats", varTheme.goldSoft, RGBA(0,0,0,0))
                        Height: =44
                        Width: =240
                        Y: =296
                  - txtCatNavSeatsLabel:
                      Control: Label
                      Properties:
                        Color: =If(varCurrentPage = "seats", varTheme.white, varTheme.silver)
                        Fill: =RGBA(0,0,0,0)
                        Font: =varTheme.sans
                        FontWeight: =If(varCurrentPage = "seats", FontWeight.Semibold, FontWeight.Normal)
                        Height: =44
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =13
                        Text: ="Seats"
                        Width: =200
                        Wrap: =false
                        X: =24
                        Y: =296
                  - btnCatNavSeats:
                      Control: Button
                      Properties:
                        Appearance: ='ButtonCanvas.Appearance'.Transparent
                        Height: =44
                        OnSelect: |-
                          =Set(varCurrentPage, "seats");
                          Navigate(scrSeats, ScreenTransition.Fade)
                        Text: =""
                        Width: =240
                        Y: =296
                  - recCatNavPdlActive:
                      Control: Rectangle
                      Properties:
                        Fill: =varTheme.gold
                        Height: =44
                        Visible: =varCurrentPage = "pdl"
                        Width: =3
                        Y: =340
                  - recCatNavPdlBg:
                      Control: Rectangle
                      Properties:
                        Fill: =If(varCurrentPage = "pdl", varTheme.goldSoft, RGBA(0,0,0,0))
                        Height: =44
                        Width: =240
                        Y: =340
                  - txtCatNavPdlLabel:
                      Control: Label
                      Properties:
                        Color: =If(varCurrentPage = "pdl", varTheme.white, varTheme.silver)
                        Fill: =RGBA(0,0,0,0)
                        Font: =varTheme.sans
                        FontWeight: =If(varCurrentPage = "pdl", FontWeight.Semibold, FontWeight.Normal)
                        Height: =44
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =13
                        Text: ="PDL LATAM"
                        Width: =200
                        Wrap: =false
                        X: =24
                        Y: =340
                  - btnCatNavPdl:
                      Control: Button
                      Properties:
                        Appearance: ='ButtonCanvas.Appearance'.Transparent
                        Height: =44
                        OnSelect: |-
                          =Set(varCurrentPage, "pdl");
                          Navigate(scrPDLLatam, ScreenTransition.Fade)
                        Text: =""
                        Width: =240
                        Y: =340
                  - recCatNavCritActive:
                      Control: Rectangle
                      Properties:
                        Fill: =varTheme.gold
                        Height: =44
                        Visible: =varCurrentPage = "criteria"
                        Width: =3
                        Y: =384
                  - recCatNavCritBg:
                      Control: Rectangle
                      Properties:
                        Fill: =If(varCurrentPage = "criteria", varTheme.goldSoft, RGBA(0,0,0,0))
                        Height: =44
                        Width: =240
                        Y: =384
                  - txtCatNavCritLabel:
                      Control: Label
                      Properties:
                        Color: =If(varCurrentPage = "criteria", varTheme.white, varTheme.silver)
                        Fill: =RGBA(0,0,0,0)
                        Font: =varTheme.sans
                        FontWeight: =If(varCurrentPage = "criteria", FontWeight.Semibold, FontWeight.Normal)
                        Height: =44
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =13
                        Text: ="Criteria"
                        Width: =200
                        Wrap: =false
                        X: =24
                        Y: =384
                  - btnCatNavCrit:
                      Control: Button
                      Properties:
                        Appearance: ='ButtonCanvas.Appearance'.Transparent
                        Height: =44
                        OnSelect: |-
                          =Set(varCurrentPage, "criteria");
                          Navigate(scrCriteria, ScreenTransition.Fade)
                        Text: =""
                        Width: =240
                        Y: =384
                  - recCatSidebarFooterDivider:
                      Control: Rectangle
                      Properties:
                        Fill: =varTheme.medGray
                        Height: =1
                        Width: =192
                        X: =24
                        Y: =Parent.Height - 110
                  - txtCatSidebarUserName:
                      Control: ModernText
                      Properties:
                        Color: =varTheme.offWhite
                        Font: =varTheme.sans
                        FontWeight: =FontWeight.Semibold
                        Height: =20
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =13
                        Text: =varCurrentUser.name
                        Width: =192
                        Wrap: =false
                        X: =24
                        Y: =Parent.Height - 96
                  - txtCatSidebarUserRole:
                      Control: ModernText
                      Properties:
                        Color: =varTheme.lightGray
                        Font: =varTheme.sans
                        Height: =16
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =11
                        Text: =varCurrentUser.role
                        Width: =192
                        Wrap: =false
                        X: =24
                        Y: =Parent.Height - 74
                  - txtCatSidebarUserEmail:
                      Control: ModernText
                      Properties:
                        Color: =varTheme.lightGray
                        Font: =varTheme.sans
                        Height: =16
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =10
                        Text: =varCurrentUser.email
                        Width: =192
                        Wrap: =false
                        X: =24
                        Y: =Parent.Height - 56
            - grpCatContent:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Fill: =varTheme.black
                  Height: =Parent.Height
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =24
                  LayoutOverflowY: =LayoutOverflow.Scroll
                  PaddingBottom: =32
                  PaddingLeft: =32
                  PaddingRight: =32
                  PaddingTop: =32
                  Width: =Parent.Width - 240
                  X: =240
                Children:
                  - grpCatHeader:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =RGBA(0,0,0,0)
                        FillPortions: =0
                        Height: =76
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =6
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                      Children:
                        - txtCatTitle:
                            Control: ModernText
                            Properties:
                              AlignInContainer: =AlignInContainer.Stretch
                              Color: =varTheme.white
                              Font: =varTheme.serif
                              FontWeight: =FontWeight.Bold
                              Height: =44
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =36
                              Text: ="Courses Catalog"
                              Wrap: =false
                        - txtCatSubtitle:
                            Control: ModernText
                            Properties:
                              AlignInContainer: =AlignInContainer.Stretch
                              Color: =varTheme.silver
                              Font: =varTheme.sans
                              Height: =20
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =13
                              Text: ="Executive seminars at the world's top business schools"
                              Wrap: =false
                  - grpCatFilters:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =RGBA(0,0,0,0)
                        FillPortions: =0
                        Height: =48
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =12
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                      Children:
                        - txtCatSearch:
                            Control: ModernTextInput
                            Properties:
                              AlignInContainer: =AlignInContainer.Stretch
                              BorderColor: =varTheme.lightGray
                              Color: =varTheme.offWhite
                              Fill: =varTheme.darkGray
                              FillPortions: =1
                              Height: =40
                              OnChange: |-
                                =UpdateContext({
                                  locSearch: Self.Text
                                })
                              Placeholder: ="Search courses, providers or skills..."
                        - cmbCatCategory:
                            Control: ModernCombobox
                            Properties:
                              AlignInContainer: =AlignInContainer.Stretch
                              Height: =40
                              Items: =Distinct(colCourses, Category)
                              ItemDisplayText: =ThisItem.Value
                              OnChange: |-
                                =UpdateContext({
                                  locCategory:
                                    If(IsBlank(Self.Selected), Blank(), Self.Selected.Value)
                                })
                              SelectMultiple: =false
                              Width: =280
                        - btnCatClearCategory:
                            Control: Button
                            Properties:
                              AlignInContainer: =AlignInContainer.Stretch
                              Appearance: ='ButtonCanvas.Appearance'.Transparent
                              Height: =40
                              OnSelect: |-
                                =UpdateContext({
                                  locCategory: "",
                                  locSearch: ""
                                })
                              Text: ="Clear filter"
                              Visible: =!IsBlank(locCategory) || locSearch <> ""
                              Width: =120
                  - galCatCourses:
                      Control: Gallery
                      Variant: Vertical
                      Properties:
                        FillPortions: =0
                        Height: =RoundUp(CountRows(Self.AllItems) / 2, 0) * 316 + 16
                        Items: |-
                          =Filter(
                            colCourses,
                            (locSearch = ""
                              || locSearch in CourseName
                              || locSearch in Provider
                              || locSearch in Skills)
                            && (IsBlank(locCategory)
                              || Category = locCategory)
                            && Status = "Active"
                          )
                        ShowScrollbar: =false
                        TemplatePadding: =8
                        TemplateSize: =300
                      Children:
                        - cardCatCourse:
                            Control: GroupContainer
                            Variant: ManualLayout
                            Properties:
                              BorderColor: =varTheme.lightGray
                              BorderThickness: =1
                              Fill: =varTheme.darkGray
                              Height: =Parent.TemplateHeight - 16
                              RadiusBottomLeft: =8
                              RadiusBottomRight: =8
                              RadiusTopLeft: =8
                              RadiusTopRight: =8
                              Width: =Parent.TemplateWidth - 16
                            Children:
                              - catCardClickOverlay:
                                  Control: Button
                                  Properties:
                                    Appearance: ='ButtonCanvas.Appearance'.Transparent
                                    BorderThickness: =0
                                    Height: =Parent.Height
                                    OnSelect: |-
                                      =Set(varSelectedCourse, ThisItem);
                                      Navigate(scrCourseDetail, ScreenTransition.Fade)
                                    Text: =""
                                    Width: =Parent.Width
                              - grpCatCardBody:
                                  Control: GroupContainer
                                  Variant: AutoLayout
                                  Properties:
                                    Fill: =RGBA(0,0,0,0)
                                    Height: =Parent.Height
                                    LayoutAlignItems: =LayoutAlignItems.Stretch
                                    LayoutDirection: =LayoutDirection.Vertical
                                    LayoutGap: =10
                                    PaddingBottom: =20
                                    PaddingLeft: =20
                                    PaddingRight: =20
                                    PaddingTop: =20
                                    Width: =Parent.Width
                                  Children:
                                    - grpCatCardTopRow:
                                        Control: GroupContainer
                                        Variant: AutoLayout
                                        Properties:
                                          Fill: =RGBA(0,0,0,0)
                                          FillPortions: =0
                                          Height: =22
                                          LayoutAlignItems: =LayoutAlignItems.Center
                                          LayoutDirection: =LayoutDirection.Horizontal
                                          LayoutGap: =8
                                          LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                                          LayoutMinHeight: =0
                                          LayoutMinWidth: =0
                                        Children:
                                          - txtCatCardCode:
                                              Control: ModernText
                                              Properties:
                                                AlignInContainer: =AlignInContainer.Center
                                                Color: =varTheme.gold
                                                FillPortions: =1
                                                Font: =varTheme.sans
                                                FontWeight: =FontWeight.Bold
                                                Height: =22
                                                PaddingBottom: =0
                                                PaddingLeft: =0
                                                PaddingRight: =0
                                                PaddingTop: =0
                                                Size: =12
                                                Text: =Upper(ThisItem.Code)
                                                Wrap: =false
                                          - grpCatCardCategoryBadge:
                                              Control: GroupContainer
                                              Variant: ManualLayout
                                              Properties:
                                                AlignInContainer: =AlignInContainer.Center
                                                Fill: =RGBA(0,0,0,0)
                                                FillPortions: =0
                                                Height: =22
                                                LayoutMinHeight: =0
                                                LayoutMinWidth: =0
                                                Width: =110
                                              Children:
                                                - recCatCardCategoryBg:
                                                    Control: Rectangle
                                                    Properties:
                                                      BorderColor: =varTheme.info
                                                      Fill: =varTheme.infoSoft
                                                      Height: =Parent.Height
                                                      Width: =Parent.Width
                                                - txtCatCardCategoryText:
                                                    Control: ModernText
                                                    Properties:
                                                      Align: =Align.Center
                                                      Color: =varTheme.info
                                                      Font: =varTheme.sans
                                                      FontWeight: =FontWeight.Semibold
                                                      Height: =Parent.Height
                                                      PaddingBottom: =0
                                                      PaddingLeft: =6
                                                      PaddingRight: =6
                                                      PaddingTop: =0
                                                      Size: =10
                                                      Text: =ThisItem.Category
                                                      Width: =Parent.Width
                                                      Wrap: =false
                                    - txtCatCardName:
                                        Control: ModernText
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Stretch
                                          Color: =varTheme.offWhite
                                          Font: =varTheme.serif
                                          FontWeight: =FontWeight.Semibold
                                          Height: =44
                                          PaddingBottom: =0
                                          PaddingLeft: =0
                                          PaddingRight: =0
                                          PaddingTop: =0
                                          Size: =16
                                          Text: =ThisItem.CourseName
                                          VerticalAlign: =VerticalAlign.Top
                                    - txtCatCardDescription:
                                        Control: ModernText
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Stretch
                                          Color: =varTheme.silver
                                          Font: =varTheme.sans
                                          Height: =54
                                          PaddingBottom: =0
                                          PaddingLeft: =0
                                          PaddingRight: =0
                                          PaddingTop: =0
                                          Size: =13
                                          Text: =ThisItem.Description
                                          VerticalAlign: =VerticalAlign.Top
                                    - galCatCardSkills:
                                        Control: Gallery
                                        Variant: Horizontal
                                        Properties:
                                          FillPortions: =0
                                          Height: =24
                                          Items: =FirstN(Split(ThisItem.Skills, ","), 4)
                                          ShowScrollbar: =false
                                          TemplatePadding: =4
                                          TemplateSize: =96
                                        Children:
                                          - grpCatCardSkillChip:
                                              Control: GroupContainer
                                              Variant: ManualLayout
                                              Properties:
                                                Fill: =RGBA(0,0,0,0)
                                                Height: =Parent.TemplateHeight - 4
                                                Width: =Parent.TemplateWidth - 8
                                              Children:
                                                - recCatCardSkillBg:
                                                    Control: Rectangle
                                                    Properties:
                                                      BorderColor: =varTheme.silver
                                                      Fill: =varTheme.medGray
                                                      Height: =Parent.Height
                                                      Width: =Parent.Width
                                                - txtCatCardSkillText:
                                                    Control: ModernText
                                                    Properties:
                                                      Align: =Align.Center
                                                      Color: =varTheme.silver
                                                      Font: =varTheme.sans
                                                      FontWeight: =FontWeight.Semibold
                                                      Height: =Parent.Height
                                                      PaddingBottom: =0
                                                      PaddingLeft: =6
                                                      PaddingRight: =6
                                                      PaddingTop: =0
                                                      Size: =10
                                                      Text: =Trim(ThisItem.Value)
                                                      Width: =Parent.Width
                                                      Wrap: =false
                                    - recCatCardDivider:
                                        Control: Rectangle
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Stretch
                                          Fill: =varTheme.medGray
                                          Height: =1
                                    - grpCatCardMetaRow:
                                        Control: GroupContainer
                                        Variant: AutoLayout
                                        Properties:
                                          Fill: =RGBA(0,0,0,0)
                                          FillPortions: =0
                                          Height: =44
                                          LayoutAlignItems: =LayoutAlignItems.Center
                                          LayoutDirection: =LayoutDirection.Horizontal
                                          LayoutGap: =8
                                          LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                                          LayoutMinHeight: =0
                                          LayoutMinWidth: =0
                                        Children:
                                          - grpCatCardMetaLeft:
                                              Control: GroupContainer
                                              Variant: AutoLayout
                                              Properties:
                                                Fill: =RGBA(0,0,0,0)
                                                LayoutDirection: =LayoutDirection.Vertical
                                                LayoutGap: =2
                                                LayoutJustifyContent: =LayoutJustifyContent.Center
                                                LayoutMinHeight: =0
                                                LayoutMinWidth: =0
                                              Children:
                                                - txtCatCardProvider:
                                                    Control: ModernText
                                                    Properties:
                                                      AlignInContainer: =AlignInContainer.Stretch
                                                      Color: =varTheme.offWhite
                                                      Font: =varTheme.sans
                                                      FontWeight: =FontWeight.Semibold
                                                      Height: =18
                                                      PaddingBottom: =0
                                                      PaddingLeft: =0
                                                      PaddingRight: =0
                                                      PaddingTop: =0
                                                      Size: =11
                                                      Text: =ThisItem.Provider & " · " & ThisItem.Duration & " · " & ThisItem.Format
                                                      Wrap: =false
                                                - txtCatCardSeatsLine:
                                                    Control: ModernText
                                                    Properties:
                                                      AlignInContainer: =AlignInContainer.Stretch
                                                      Color: =varTheme.lightGray
                                                      Font: =varTheme.sans
                                                      Height: =16
                                                      PaddingBottom: =0
                                                      PaddingLeft: =0
                                                      PaddingRight: =0
                                                      PaddingTop: =0
                                                      Size: =11
                                                      Text: |-
                                                        =ThisItem.Seats & " seats · " &
                                                          CountIf(colNominations, CourseID = Value(ThisItem.CourseID)) &
                                                          " nominated"
                                                      Wrap: =false
                                          - txtCatCardInvestment:
                                              Control: ModernText
                                              Properties:
                                                Align: =Align.Right
                                                AlignInContainer: =AlignInContainer.Center
                                                Color: =varTheme.gold
                                                Font: =varTheme.serif
                                                FontWeight: =FontWeight.Bold
                                                Height: =40
                                                PaddingBottom: =0
                                                PaddingLeft: =0
                                                PaddingRight: =0
                                                PaddingTop: =0
                                                Size: =16
                                                Text: =Text(ThisItem.Investment, "[$-en-US]$#,##0")
                                                Width: =120
                                                Wrap: =false
                  - txtCatEmptyState:
                      Control: ModernText
