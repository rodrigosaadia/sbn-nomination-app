Screens:
  scrCatalog:
    Properties:
      Fill: =varTheme.black
      OnVisible: |-
        =Set(varCurrentPage, "catalog");
        UpdateContext({
          locSearch: "",
          locCategory: ""
        })
    Children:
      - grpCatalogRoot:
          Control: GroupContainer
          Variant: ManualLayout
          Properties:
            Fill: =varTheme.black
            Height: =Parent.Height
            Width: =Parent.Width
          Children:
            - grpCatSidebar:
                Control: GroupContainer
                Variant: ManualLayout
                Properties:
                  Fill: =varTheme.darkGray
                  Height: =Parent.Height
                  Width: =240
                Children:
                  - recCatSidebarBorder:
                      Control: Rectangle
                      Properties:
                        Fill: =varTheme.medGray
                        Height: =Parent.Height
                        Width: =1
                        X: =239
                  - txtCatBrandWordmark:
                      Control: Label
                      Properties:
                        Color: =varTheme.white
                        Fill: =RGBA(0,0,0,0)
                        Font: =varTheme.serif
                        FontWeight: =FontWeight.Bold
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =22
                        Height: =32
                        Text: ="L'ORÉAL"
                        Width: =192
                        Wrap: =false
                        X: =24
                        Y: =28
                  - txtCatBrandSubtitle:
                      Control: Label
                      Properties:
                        Color: =varTheme.gold
                        Fill: =RGBA(0,0,0,0)
                        Font: =varTheme.sans
                        FontWeight: =FontWeight.Semibold
                        Height: =16
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =9
                        Text: ="SEMINAR BY NOMINATION"
                        Width: =192
                        Wrap: =false
                        X: =24
                        Y: =60
                  - recCatSidebarDivider:
                      Control: Rectangle
                      Properties:
                        Fill: =varTheme.medGray
                        Height: =1
                        Width: =192
                        X: =24
                        Y: =100
                  - recCatNavDashActive:
                      Control: Rectangle
                      Properties:
                        Fill: =varTheme.gold
                        Height: =44
                        Visible: =varCurrentPage = "dashboard"
                        Width: =3
                        Y: =120
                  - recCatNavDashBg:
                      Control: Rectangle
                      Properties:
                        Fill: =If(varCurrentPage = "dashboard", varTheme.goldSoft, RGBA(0,0,0,0))
                        Height: =44
                        Width: =240
                        Y: =120
                  - txtCatNavDashLabel:
                      Control: Label
                      Properties:
                        Color: =If(varCurrentPage = "dashboard", varTheme.white, varTheme.silver)
                        Fill: =RGBA(0,0,0,0)
                        Font: =varTheme.sans
                        FontWeight: =If(varCurrentPage = "dashboard", FontWeight.Semibold, FontWeight.Normal)
                        Height: =44
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =13
                        Text: ="Dashboard"
                        Width: =200
                        Wrap: =false
                        X: =24
                        Y: =120
                  - btnCatNavDash:
                      Control: Button
                      Properties:
                        Appearance: ='ButtonCanvas.Appearance'.Transparent
                        Height: =44
                        OnSelect: |-
                          =Set(varCurrentPage, "dashboard");
                          Navigate(scrDashboard, ScreenTransition.Fade)
                        Text: =""
                        Width: =240
                        Y: =120
                  - recCatNavCatActive:
                      Control: Rectangle
                      Properties:
                        Fill: =varTheme.gold
                        Height: =44
                        Visible: =varCurrentPage = "catalog"
                        Width: =3
                        Y: =164
                  - recCatNavCatBg:
                      Control: Rectangle
                      Properties:
                        Fill: =If(varCurrentPage = "catalog", varTheme.goldSoft, RGBA(0,0,0,0))
