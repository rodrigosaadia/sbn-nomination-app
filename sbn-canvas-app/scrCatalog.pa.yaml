                        Width: =240
                        Y: =164
                  - txtCatNavCatLabel:
                      Control: Label
                      Properties:
                        Color: =If(varCurrentPage = "catalog", varTheme.white, varTheme.silver)
                        Fill: =RGBA(0,0,0,0)
                        Font: =varTheme.sans
                        FontWeight: =If(varCurrentPage = "catalog", FontWeight.Semibold, FontWeight.Normal)
                        Height: =44
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =13
