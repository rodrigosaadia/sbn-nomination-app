                        Width: =3
                        Y: =252
                  - recCatNavNomBg:
                      Control: Rectangle
                      Properties:
                        Fill: =If(varCurrentPage = "nominations", varTheme.goldSoft, RGBA(0,0,0,0))
                        Height: =44
                        Width: =240
                        Y: =252
                  - txtCatNavNomLabel:
                      Control: Label
                      Properties:
                        Color: =If(varCurrentPage = "nominations", varTheme.white, varTheme.silver)
                        Fill: =RGBA(0,0,0,0)
                        Font: =varTheme.sans
                        FontWeight: =If(varCurrentPage = "nominations", FontWeight.Semibold, FontWeight.Normal)
                        Height: =44
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =13
